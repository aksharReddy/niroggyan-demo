language: en
tone_instructions: >
  This is a healthcare SaaS platform handling real patient diagnostic data.
  Be direct. Flag compliance and clinical correctness issues with high priority.

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false

  # Global rules — apply to every file in the repo
  instructions: |
    This codebase processes patient health data for diagnostic labs.
    Enforce these rules on every PR regardless of which file is changed:

    1. No real-looking PII (patient names, phone numbers, ID numbers) in source code or tests.
       Test data must use obviously fake values.

    2. All public API functions must return a dict with exactly three keys:
       status (str), message (str), data (dict or None).
       Flag any public function that returns a different shape.

    3. Never allow patient data to be written to logs or print statements.

    4. Input validation must exist at every public function boundary.
       Flag if a public function removes its None/empty input check.

  path_instructions:

    - path: "src/risk_calculator.py"
      instructions: |
        CLINICAL RULES — these are medical requirements, not just coding style:

        1. All final risk scores must be clamped to 0-100. A score outside
           this range is clinically invalid.

        2. Age is a mandatory factor in the cardiovascular risk formula.
           Removing age weighting changes clinical outcomes — flag immediately.

        3. Risk level thresholds are clinically defined and must not change:
           LOW (0-30), MODERATE (31-60), HIGH (61-80), CRITICAL (81-100).

        4. calculate_cardiovascular_risk() must return a dict with keys:
           score, risk_level, patient_id. This is consumed by the report
           generator — a type change here breaks patient report generation.

    - path: "src/lims_handler.py"
      instructions: |
        1. Vendor must always be validated against SUPPORTED_LIMS_VENDORS
           before any processing. Unsupported vendors must be rejected.
        2. Never ingest a lab result payload with zero test results.

    - path: "tests/**"
      instructions: |
        1. Flag any PR that removes existing tests without explanation.
        2. Flag test functions that contain no assert statements.
